spring.application.name=analytics-backend

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

analytics.active-window-seconds=${ANALYTICS_ACTIVE_WINDOW_SECONDS:300}
analytics.page-window-seconds=${ANALYTICS_PAGE_WINDOW_SECONDS:900}
analytics.rate-limit.events-per-second=${EVENTS_RATE_LIMIT_PER_SECOND:100}
server.port=8080
